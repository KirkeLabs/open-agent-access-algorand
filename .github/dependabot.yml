version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/London
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    groups:
      typescript-tooling:
        patterns:
          - typescript
          - tsx
          - vitest
          - vite
          - "@types/*"
      x402-algorand:
        patterns:
          - "@x402/*"
          - "@algorandfoundation/*"
          - algosdk
      hono-adapters:
        patterns:
          - hono
          - "@hono/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
      - security
