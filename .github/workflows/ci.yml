name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm build
      - run: corepack pnpm test
      - run: corepack pnpm lint
      - run: corepack pnpm package:check
      - run: corepack pnpm pack:dry-run
      - run: corepack pnpm security:check
      - run: corepack pnpm audit:prod
      - run: corepack pnpm smoke:example
